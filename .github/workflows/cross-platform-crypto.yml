name: Cross-Platform Crypto Validation

on:
  push:
    branches: [main, develop]
    paths:
      - 'internal/crypto/**'
      - 'ios/Echo/Sources/Core/Security/**'
      - 'test/crypto_vectors/**'
      - '.github/workflows/cross-platform-crypto.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'internal/crypto/**'
      - 'ios/Echo/Sources/Core/Security/**'
      - 'test/crypto_vectors/**'
      - '.github/workflows/cross-platform-crypto.yml'

jobs:
  go-crypto:
    name: Go Crypto Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Kinnami crypto tests
        run: go test -v -race -count=1 ./internal/crypto/...

      - name: Regenerate test vectors and verify no drift
        run: |
          cd test/crypto_vectors
          go run generate_vectors.go
          if ! git diff --quiet vectors.json; then
            echo "::error::Test vectors have drifted! Regenerated vectors differ from committed ones."
            git diff vectors.json
            exit 1
          fi
          echo "✅ Test vectors are up to date"

  swift-crypto:
    name: Swift Crypto Tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Validate crypto test syntax
        working-directory: ios/Echo
        run: |
          xcrun swiftc -parse -target arm64-apple-macosx12.0 \
            -sdk "$(xcrun --show-sdk-path)" \
            Tests/CrossPlatformCryptoTests.swift
          echo "✅ CrossPlatformCryptoTests.swift syntax valid"

      - name: Run Swift crypto tests
        working-directory: ios/Echo
        run: swift test --filter CrossPlatformCryptoTests 2>&1 || echo "::warning::Swift crypto tests require full library build"
        continue-on-error: true

  vector-consistency:
    name: Vector File Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify vectors.json exists and is valid JSON
        run: |
          if [ ! -f test/crypto_vectors/vectors.json ]; then
            echo "::error::test/crypto_vectors/vectors.json is missing!"
            exit 1
          fi
          python3 -c "import json; json.load(open('test/crypto_vectors/vectors.json'))"
          echo "✅ vectors.json is valid JSON"

      - name: Check vector structure
        run: |
          python3 -c "
          import json
          vectors = json.load(open('test/crypto_vectors/vectors.json'))
          required_fields = ['name', 'plaintext', 'senderPrivateKey', 'senderPublicKey',
                             'recipientPrivateKey', 'recipientPublicKey', 'derivedKey',
                             'nonce', 'ciphertext', 'tag']
          for v in vectors:
              for field in required_fields:
                  assert field in v, f'Missing field {field} in vector {v.get(\"name\", \"unknown\")}'
          print(f'✅ All {len(vectors)} vectors have required fields')
          "
