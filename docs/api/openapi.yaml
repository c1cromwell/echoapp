  # ============================================================================
  # WEBSOCKET
  # ============================================================================
  /ws:
    get:
      tags:
        - Messaging
      summary: WebSocket connection for real-time events
      description: |
        Establish WebSocket connection for real-time message delivery,
        presence updates, typing indicators, and call signaling.
        
        ## Events
        - `message.new` - New message received
        - `message.updated` - Message edited  
        - `message.deleted` - Message deleted
        - `typing.start` / `typing.stop` - Typing indicators
        - `presence.update` - User online/offline status
        - `call.incoming` - Incoming call
      operationId: websocketConnect
      responses:
        '101':
          description: Switching protocols to WebSocket
_version:
          type: string
        device_name:
          type: string

    # --------------------------------------------------------------------------
    # Authentication
    # --------------------------------------------------------------------------
    AuthResponse:
      type: object
      required:
        - access_token
        - refresh_token
        - user
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_at:
          type: string
          format: date-time
        user:
          $ref: '#/components/schemas/UserProfile'

    PasskeyAuthRequest:
      type: object
      required:
        - auth_type
        - credential
      properties:
        auth_type:
          type: string
          const: passkey
        credential:
          type: object
          description: WebAuthn credential assertion

    DIDAuthRequest:
      type: object
      required:
        - auth_type
        - did
        - signature
        - timestamp
      properties:
        auth_type:
          type: string
          const: did_signature
        did:
          type: string
        signature:
          type: string
        timestamp:
          type: string
          format: date-time
        nonce:
          type: string

    # --------------------------------------------------------------------------
    # Identity & Profile
    # --------------------------------------------------------------------------
    DIDDocument:
      type: object
      required:
        - id
        - verificationMethod
      properties:
        id:
          type: string
          example: "did:cardano:abc123"
        controller:
          type: string
        verificationMethod:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              type:
                type: string
              controller:
                type: string
              publicKeyMultibase:
                type: string
        authentication:
          type: array
          items:
            type: string
        service:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              type:
                type: string
              serviceEndpoint:
                type: string

    UserProfile:
      type: object
      required:
        - did
        - display_name
        - trust_score
      properties:
        did:
          type: string
        display_name:
          type: string
