openapi: 3.1.0
info:
  title: Echo - Decentralized Messaging Platform API
  description: |
    # Overview
    Echo is a decentralized, blockchain-anchored messaging platform that combines 
    the best features of WhatsApp, Telegram, and Signal with blockchain-verified 
    identity and provable message integrity.
    
    ## Key Features
    - **Decentralized Identity (DID)** - Self-sovereign identity on Cardano blockchain
    - **End-to-End Encryption** - Noise Protocol implementation
    - **Blockchain Anchoring** - Provable message integrity via Constellation Hypergraph
    - **Trust Scoring** - Dynamic 0-100 trust scores based on behavior and verification
    - **ECHO Token Rewards** - Incentive system for platform participation
    
    ## Authentication
    All API requests require authentication via DID-based signatures or session tokens
    obtained through the authentication endpoints.
    
    ## Rate Limiting
    - Standard users: 100 requests/minute
    - Verified users: 500 requests/minute
    - Enterprise accounts: 2000 requests/minute
    
    Rate limit headers are included in all responses:
    - `X-RateLimit-Limit`
    - `X-RateLimit-Remaining`
    - `X-RateLimit-Reset`
  version: 1.0.0
  contact:
    name: Echo API Support
    email: api-support@echo.app
    url: https://developers.echo.app
  license:
    name: Proprietary
    url: https://echo.app/terms

servers:
  - url: https://api.echo.app/v1
    description: Production server
  - url: https://api.staging.echo.app/v1
    description: Staging server
  - url: https://api.sandbox.echo.app/v1
    description: Sandbox for testing

tags:
  - name: Authentication
    description: User registration, authentication, and session management
  - name: Identity
    description: DID management, verification, and trust scoring
  - name: Messaging
    description: Send, receive, and manage messages
  - name: Conversations
    description: Manage one-on-one and group conversations
  - name: Groups
    description: Create and manage groups and channels
  - name: Calls
    description: Voice and video calling functionality
  - name: Files
    description: File upload, download, and management
  - name: Trust
    description: Trust network and verification management
  - name: Tokens
    description: ECHO token rewards and transactions
  - name: Contacts
    description: Contact management and discovery
  - name: Notifications
    description: Push notification preferences and management
  - name: Enterprise
    description: Enterprise-specific endpoints for verified organizations
  - name: Bots
    description: Bot framework and automation endpoints

security:
  - BearerAuth: []
  - DIDSignature: []

paths:
  # ============================================================================
  # AUTHENTICATION
  # ============================================================================
  /auth/register/phone:
    post:
      tags:
        - Authentication
      summary: Initialize registration with phone number
      description: |
        Begin the universal onboarding flow by sending an SMS verification code.
        This is the entry point for non-crypto-native users.
      operationId: initiatePhoneRegistration
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - phone_number
                - country_code
              properties:
                phone_number:
                  type: string
                  pattern: '^\d{10,15}$'
                  example: "5551234567"
                country_code:
                  type: string
                  pattern: '^\+\d{1,3}$'
                  example: "+1"
                device_info:
                  $ref: '#/components/schemas/DeviceInfo'
      responses:
        '200':
          description: Verification code sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  verification_id:
                    type: string
                    format: uuid
                  expires_at:
                    type: string
                    format: date-time
                  retry_after:
                    type: integer
                    description: Seconds before code can be resent
        '429':
          $ref: '#/components/responses/RateLimitExceeded'

  /auth/register/verify:
    post:
      tags:
        - Authentication
      summary: Verify phone number and create DID
      description: |
        Complete phone verification and automatically create a Cardano-based DID.
        Returns session tokens and initiates passkey creation flow.
      operationId: verifyPhoneAndCreateDID
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - verification_id
                - code
              properties:
                verification_id:
                  type: string
                  format: uuid
                code:
                  type: string
                  pattern: '^\d{6}$'
                  example: "123456"
                passkey_challenge:
                  type: string
                  format: base64
                  description: WebAuthn challenge for passkey creation
      responses:
        '201':
          description: Account created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/InvalidVerificationCode'

  /auth/register/credential:
    post:
      tags:
        - Authentication
      summary: Register with verifiable credential (OIDC4VC)
      description: |
        Streamlined onboarding using pre-existing verifiable credentials.
        Supports digital driver's licenses, bank-issued credentials, and 
        proof of humanity certificates.
      operationId: registerWithCredential
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - credential_presentation
              properties:
                credential_presentation:
                  type: string
                  description: OIDC4VC credential presentation JWT
                credential_type:
                  type: string
                  enum:
                    - government_id
                    - bank_credential
                    - proof_of_humanity
                    - professional_credential
                device_info:
                  $ref: '#/components/schemas/DeviceInfo'
      responses:
        '201':
          description: Account created with high initial trust score
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/AuthResponse'
                  - type: object
                    properties:
                      verification_badge:
                        $ref: '#/components/schemas/VerificationBadge'
                      initial_trust_score:
                        type: integer
                        minimum: 0
                        maximum: 100

  /auth/login:
    post:
      tags:
        - Authentication
      summary: Authenticate existing user
      description: |
        Authenticate using passkey (WebAuthn) or DID signature.
        Supports biometric authentication on mobile devices.
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/PasskeyAuthRequest'
                - $ref: '#/components/schemas/DIDAuthRequest'
              discriminator:
                propertyName: auth_type
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/refresh:
    post:
      tags:
        - Authentication
      summary: Refresh access token
      operationId: refreshToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refresh_token
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: New tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /auth/logout:
    post:
      tags:
        - Authentication
      summary: Logout and invalidate session
      operationId: logout
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                all_devices:
                  type: boolean
                  default: false
                  description: Logout from all devices if true
      responses:
        '204':
          description: Successfully logged out

  /auth/recovery/initiate:
    post:
      tags:
        - Authentication
      summary: Initiate account recovery
      description: |
        Start account recovery process using backup recovery phrase
        or trusted contact verification.
      operationId: initiateRecovery
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - recovery_method
                - identifier
              properties:
                recovery_method:
                  type: string
                  enum: [recovery_phrase, trusted_contacts, backup_key]
                identifier:
                  type: string
                  description: DID or phone number associated with account
      responses:
        '200':
          description: Recovery process initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  recovery_session_id:
                    type: string
                    format: uuid
                  required_steps:
                    type: array
                    items:
                      type: string
                  expires_at:
                    type: string
                    format: date-time

  # ============================================================================
  # IDENTITY
  # ============================================================================
  /identity/did:
    get:
      tags:
        - Identity
      summary: Get current user's DID document
      operationId: getOwnDID
      responses:
        '200':
          description: DID document retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DIDDocument'

  /identity/did/{did}:
    get:
      tags:
        - Identity
      summary: Resolve a DID to its document
      operationId: resolveDID
      parameters:
        - name: did
          in: path
          required: true
          schema:
            type: string
            pattern: '^did:cardano:[a-zA-Z0-9]+$'
      responses:
        '200':
          description: DID document found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DIDDocument'
        '404':
          $ref: '#/components/responses/NotFound'

  /identity/credentials:
    get:
      tags:
        - Identity
      summary: List user's verifiable credentials
      operationId: listCredentials
      responses:
        '200':
          description: List of credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  credentials:
                    type: array
                    items:
                      $ref: '#/components/schemas/VerifiableCredential'
    post:
      tags:
        - Identity
      summary: Add a verifiable credential
      operationId: addCredential
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - credential
              properties:
                credential:
                  type: string
                  description: Verifiable credential JWT or JSON-LD
      responses:
        '201':
          description: Credential added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifiableCredential'

  /identity/verification/initiate:
    post:
      tags:
        - Identity
      summary: Initiate high-assurance identity verification
      description: |
        Start the in-app identity verification process using government ID 
        or Apple Digital ID. Rewards user with ECHO tokens upon completion.
      operationId: initiateVerification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - verification_method
              properties:
                verification_method:
                  type: string
                  enum:
                    - government_id_scan
                    - apple_digital_id
                    - bank_verification
      responses:
        '200':
          description: Verification session created
          content:
            application/json:
              schema:
                type: object
                properties:
                  session_id:
                    type: string
                    format: uuid
                  verification_url:
                    type: string
                    format: uri
                    description: URL for ID scanning widget (if applicable)
                  expires_at:
                    type: string
                    format: date-time

  /identity/verification/{session_id}/complete:
    post:
      tags:
        - Identity
      summary: Complete identity verification
      operationId: completeVerification
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                verification_data:
                  type: string
                  description: Encrypted verification result from provider
      responses:
        '200':
          description: Verification completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [verified, pending_review, rejected]
                  badge:
                    $ref: '#/components/schemas/VerificationBadge'
                  trust_score_change:
                    type: integer
                  echo_reward:
                    type: number
                    description: ECHO tokens awarded

  /identity/trust-score:
    get:
      tags:
        - Identity
      summary: Get current user's trust score details
      operationId: getTrustScore
      responses:
        '200':
          description: Trust score breakdown
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrustScore'

  # ============================================================================
  # USER PROFILE
  # ============================================================================
  /profile:
    get:
      tags:
        - Identity
      summary: Get current user's profile
      operationId: getProfile
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
    patch:
      tags:
        - Identity
      summary: Update profile
      operationId: updateProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                display_name:
                  type: string
                  maxLength: 64
                bio:
                  type: string
                  maxLength: 500
                avatar:
                  type: string
                  description: File ID of uploaded avatar image
                status:
                  type: string
                  maxLength: 140
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'

  /profile/personas:
    get:
      tags:
        - Identity
      summary: List user's personas
      operationId: listPersonas
      responses:
        '200':
          description: List of personas
          content:
            application/json:
              schema:
                type: object
                properties:
                  personas:
                    type: array
                    maxItems: 5
                    items:
                      $ref: '#/components/schemas/Persona'
    post:
      tags:
        - Identity
      summary: Create a new persona
      operationId: createPersona
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - display_name
                - category
              properties:
                display_name:
                  type: string
                  maxLength: 64
                category:
                  type: string
                  enum: [professional, personal, family, gaming, custom]
                custom_label:
                  type: string
                  maxLength: 32
                avatar:
                  type: string
                bio:
                  type: string
                  maxLength: 500
      responses:
        '201':
          description: Persona created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Persona'
        '400':
          description: Maximum personas reached (5)

  /profile/personas/{persona_id}:
    patch:
      tags:
        - Identity
      summary: Update a persona
      operationId: updatePersona
      parameters:
        - name: persona_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                display_name:
                  type: string
                avatar:
                  type: string
                bio:
                  type: string
      responses:
        '200':
          description: Persona updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Persona'
    delete:
      tags:
        - Identity
      summary: Delete a persona
      operationId: deletePersona
      parameters:
        - name: persona_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Persona deleted

  # ============================================================================
  # CONTACTS
  # ============================================================================
  /contacts:
    get:
      tags:
        - Contacts
      summary: List contacts
      operationId: listContacts
      parameters:
        - name: trust_circle
          in: query
          schema:
            type: string
            enum: [inner_circle, trusted, acquaintance, all]
        - name: search
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
      responses:
        '200':
          description: Contact list
          content:
            application/json:
              schema:
                type: object
                properties:
                  contacts:
                    type: array
                    items:
                      $ref: '#/components/schemas/Contact'
                  next_page_token:
                    type: string

  /contacts/{contact_id}:
    get:
      tags:
        - Contacts
      summary: Get contact details
      operationId: getContact
      parameters:
        - name: contact_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Contact details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contact'
    patch:
      tags:
        - Contacts
      summary: Update contact settings
      operationId: updateContact
      parameters:
        - name: contact_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nickname:
                  type: string
                trust_circle:
                  type: string
                  enum: [inner_circle, trusted, acquaintance]
                personas_visible:
                  type: array
                  items:
                    type: string
                    format: uuid
                  description: Which of my personas this contact can see
                blocked:
                  type: boolean
                muted:
                  type: boolean
      responses:
        '200':
          description: Contact updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contact'
    delete:
      tags:
        - Contacts
      summary: Remove contact
      operationId: removeContact
      parameters:
        - name: contact_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Contact removed

  /contacts/discover:
    post:
      tags:
        - Contacts
      summary: Discover contacts by various methods
      description: |
        Find users by DID, username, or through mutual connections.
        Does not expose phone numbers to maintain privacy.
      operationId: discoverContacts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                method:
                  type: string
                  enum: [did, username, qr_code, mutual_connections]
                query:
                  type: string
                  description: DID, username, or QR payload depending on method
      responses:
        '200':
          description: Matching users found
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/ContactSearchResult'

  /contacts/requests:
    get:
      tags:
        - Contacts
      summary: List pending contact requests
      operationId: listContactRequests
      parameters:
        - name: direction
          in: query
          schema:
            type: string
            enum: [incoming, outgoing, all]
            default: incoming
      responses:
        '200':
          description: Pending requests
          content:
            application/json:
              schema:
                type: object
                properties:
                  requests:
                    type: array
                    items:
                      $ref: '#/components/schemas/ContactRequest'
    post:
      tags:
        - Contacts
      summary: Send contact request
      operationId: sendContactRequest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - target_did
              properties:
                target_did:
                  type: string
                message:
                  type: string
                  maxLength: 200
                persona_id:
                  type: string
                  format: uuid
                  description: Which persona to present to this contact
      responses:
        '201':
          description: Request sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactRequest'

  /contacts/requests/{request_id}:
    post:
      tags:
        - Contacts
      summary: Respond to contact request
      operationId: respondToContactRequest
      parameters:
        - name: request_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - action
              properties:
                action:
                  type: string
                  enum: [accept, reject, block]
                initial_trust_circle:
                  type: string
                  enum: [trusted, acquaintance]
                  default: acquaintance
      responses:
        '200':
          description: Request processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [accepted, rejected, blocked]
                  contact:
                    $ref: '#/components/schemas/Contact'

  # ============================================================================
  # CONVERSATIONS
  # ============================================================================
  /conversations:
    get:
      tags:
        - Conversations
      summary: List conversations
      operationId: listConversations
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [direct, group, channel, all]
            default: all
        - name: archived
          in: query
          schema:
            type: boolean
            default: false
        - name: folder_id
          in: query
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
      responses:
        '200':
          description: Conversation list
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversations:
                    type: array
                    items:
                      $ref: '#/components/schemas/ConversationSummary'
                  next_page_token:
                    type: string
    post:
      tags:
        - Conversations
      summary: Create a new conversation
      operationId: createConversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - type
              properties:
                type:
                  type: string
                  enum: [direct, group]
                participant_dids:
                  type: array
                  items:
                    type: string
                  minItems: 1
                  description: Required for direct (1 participant) or group (1+ participants)
                name:
                  type: string
                  maxLength: 100
                  description: Required for groups
                description:
                  type: string
                  maxLength: 500
                settings:
                  $ref: '#/components/schemas/ConversationSettings'
      responses:
        '201':
          description: Conversation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conversation'

  /conversations/{conversation_id}:
    get:
      tags:
        - Conversations
      summary: Get conversation details
      operationId: getConversation
      parameters:
        - $ref: '#/components/parameters/ConversationId'
      responses:
        '200':
          description: Conversation details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conversation'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags:
        - Conversations
      summary: Update conversation settings
      operationId: updateConversation
      parameters:
        - $ref: '#/components/parameters/ConversationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                avatar:
                  type: string
                settings:
                  $ref: '#/components/schemas/ConversationSettings'
      responses:
        '200':
          description: Conversation updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conversation'
    delete:
      tags:
        - Conversations
      summary: Leave or delete conversation
      operationId: deleteConversation
      parameters:
        - $ref: '#/components/parameters/ConversationId'
        - name: delete_for_all
          in: query
          schema:
            type: boolean
            default: false
          description: Delete for all participants (admin only)
      responses:
        '204':
          description: Left/deleted conversation

  /conversations/{conversation_id}/archive:
    post:
      tags:
        - Conversations
      summary: Archive conversation
      operationId: archiveConversation
      parameters:
        - $ref: '#/components/parameters/ConversationId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                folder_id:
                  type: string
                  format: uuid
                  description: Optional folder to archive into
      responses:
        '200':
          description: Conversation archived

  /conversations/{conversation_id}/hidden:
    post:
      tags:
        - Conversations
      summary: Move conversation to hidden folder
      description: |
        Moves the conversation to a biometrically-protected hidden folder.
        Requires biometric verification to access afterwards.
      operationId: hideConversation
      parameters:
        - $ref: '#/components/parameters/ConversationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - biometric_token
              properties:
                biometric_token:
                  type: string
                  description: Token from successful biometric authentication
                folder_id:
                  type: string
                  format: uuid
                  description: Specific hidden folder (default if not specified)
      responses:
        '200':
          description: Conversation hidden
    delete:
      tags:
        - Conversations
      summary: Remove conversation from hidden folder
      operationId: unhideConversation
      parameters:
        - $ref: '#/components/parameters/ConversationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - biometric_token
              properties:
                biometric_token:
                  type: string
      responses:
        '200':
          description: Conversation unhidden

  /conversations/{conversation_id}/participants:
    get:
      tags:
        - Conversations
      summary: List conversation participants
      operationId: listParticipants
      parameters:
        - $ref: '#/components/parameters/ConversationId'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
      responses:
        '200':
          description: Participant list
          content:
            application/json:
              schema:
                type: object
                properties:
                  participants:
                    type: array
                    items:
                      $ref: '#/components/schemas/Participant'
                  total_count:
                    type: integer
                  next_page_token:
                    type: string
    post:
      tags:
        - Conversations
      summary: Add participants to group
      operationId: addParticipants
      parameters:
        - $ref: '#/components/parameters/ConversationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - participant_dids
              properties:
                participant_dids:
                  type: array
                  items:
                    type: string
                  maxItems: 100
      responses:
        '200':
          description: Participants added

  /conversations/{conversation_id}/participants/{participant_did}:
    delete:
      tags:
        - Conversations
      summary: Remove participant from group
      operationId: removeParticipant
      parameters:
        - $ref: '#/components/parameters/ConversationId'
        - name: participant_did
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Participant removed
    patch:
      tags:
        - Conversations
      summary: Update participant role
      operationId: updateParticipantRole
      parameters:
        - $ref: '#/components/parameters/ConversationId'
        - name: participant_did
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - role
              properties:
                role:
                  type: string
                  enum: [owner, admin, moderator, member]
      responses:
        '200':
          description: Role updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Participant'

  # ============================================================================
  # MESSAGING
  # ============================================================================
  /conversations/{conversation_id}/messages:
    get:
      tags:
        - Messaging
      summary: Get messages in conversation
      operationId: getMessages
      parameters:
        - $ref: '#/components/parameters/ConversationId'
        - name: before
          in: query
          schema:
            type: string
            format: date-time
          description: Get messages before this timestamp
        - name: after
          in: query
          schema:
            type: string
            format: date-time
          description: Get messages after this timestamp
        - name: around
          in: query
          schema:
            type: string
          description: Message ID to center results around
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Message list
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items:
                      $ref: '#/components/schemas/Message'
                  has_more_before:
                    type: boolean
                  has_more_after:
                    type: boolean
    post:
      tags:
        - Messaging
      summary: Send a message
      operationId: sendMessage
      parameters:
        - $ref: '#/components/parameters/ConversationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
      responses:
        '201':
          description: Message sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '403':
          description: Cannot send to this conversation

  /conversations/{conversation_id}/messages/{message_id}:
    get:
      tags:
        - Messaging
      summary: Get specific message
      operationId: getMessage
      parameters:
        - $ref: '#/components/parameters/ConversationId'
        - $ref: '#/components/parameters/MessageId'
      responses:
        '200':
          description: Message details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
    patch:
      tags:
        - Messaging
      summary: Edit message
      description: |
        Edit a previously sent message. Creates an edit history entry 
        anchored to blockchain for provability.
      operationId: editMessage
      parameters:
        - $ref: '#/components/parameters/ConversationId'
        - $ref: '#/components/parameters/MessageId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - content
              properties:
                content:
                  type: string
                  maxLength: 10000
      responses:
        '200':
          description: Message edited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
    delete:
      tags:
        - Messaging
      summary: Delete message
      operationId: deleteMessage
      parameters:
        - $ref: '#/components/parameters/ConversationId'
        - $ref: '#/components/parameters/MessageId'
        - name: for_everyone
          in: query
          schema:
            type: boolean
            default: false
          description: Delete for all participants (sender only)
      responses:
        '204':
          description: Message deleted

  /conversations/{conversation_id}/messages/{message_id}/reactions:
    get:
      tags:
        - Messaging
      summary: Get message reactions
      operationId: getReactions
      parameters:
        - $ref: '#/components/parameters/ConversationId'
        - $ref: '#/components/parameters/MessageId'
      responses:
        '200':
          description: Reaction list
          content:
            application/json:
              schema:
                type: object
                properties:
                  reactions:
                    type: array
                    items:
                      $ref: '#/components/schemas/Reaction'
    post:
      tags:
        - Messaging
      summary: Add reaction to message
      operationId: addReaction
      parameters:
        - $ref: '#/components/parameters/ConversationId'
        - $ref: '#/components/parameters/MessageId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - emoji
              properties:
                emoji:
                  type: string
                  description: Unicode emoji or custom reaction ID
      responses:
        '201':
          description: Reaction added
    delete:
      tags:
        - Messaging
      summary: Remove reaction from message
      operationId: removeReaction
      parameters:
        - $ref: '#/components/parameters/ConversationId'
        - $ref: '#/components/parameters/MessageId'
        - name: emoji
          in: query
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Reaction removed

  /conversations/{conversation_id}/messages/{message_id}/proof:
    get:
      tags:
        - Messaging
      summary: Get blockchain proof for message
      description: |
        Retrieve cryptographic proof of message integrity and timestamp
        from the Constellation Hypergraph blockchain.
      operationId: getMessageProof
      parameters:
        - $ref: '#/components/parameters/ConversationId'
        - $ref: '#/components/parameters/MessageId'
      responses:
        '200':
          description: Blockchain proof
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageProof'

  /conversations/{conversation_id}/messages/{message_id}/forward:
    post:
      tags:
        - Messaging
      summary: Forward message to another conversation
      operationId: forwardMessage
      parameters:
        - $ref: '#/components/parameters/ConversationId'
        - $ref: '#/components/parameters/MessageId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - target_conversation_ids
              properties:
                target_conversation_ids:
                  type: array
                  items:
                    type: string
                  maxItems: 10
                include_attribution:
                  type: boolean
                  default: true
                  description: Include original sender attribution
      responses:
        '200':
          description: Message forwarded
          content:
            application/json:
              schema:
                type: object
                properties:
                  forwarded_messages:
                    type: array
                    items:
                      $ref: '#/components/schemas/Message'

  /conversations/{conversation_id}/messages/search:
    get:
      tags:
        - Messaging
      summary: Search messages in conversation
      operationId: searchMessages
      parameters:
        - $ref: '#/components/parameters/ConversationId'
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 2
        - name: from_did
          in: query
          schema:
            type: string
          description: Filter by sender
        - name: has_attachment
          in: query
          schema:
            type: boolean
        - name: date_from
          in: query
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          schema:
            type: string
            format: date
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/MessageSearchResult'
                  total_count:
                    type: integer
                  next_page_token:
                    type: string

  /conversations/{conversation_id}/typing:
    post:
      tags:
        - Messaging
      summary: Send typing indicator
      operationId: sendTypingIndicator
      parameters:
        - $ref: '#/components/parameters/ConversationId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                typing:
                  type: boolean
                  default: true
      responses:
        '204':
          description: Typing indicator sent

  /conversations/{conversation_id}/read:
    post:
      tags:
        - Messaging
      summary: Mark messages as read
      operationId: markAsRead
      parameters:
        - $ref: '#/components/parameters/ConversationId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                up_to_message_id:
                  type: string
                  description: Mark all messages up to this ID as read
      responses:
        '204':
          description: Messages marked as read

  /messages/scheduled:
    get:
      tags:
        - Messaging
      summary: List scheduled messages
      operationId: listScheduledMessages
      responses:
        '200':
          description: Scheduled messages
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items:
                      $ref: '#/components/schemas/ScheduledMessage'
    post:
      tags:
        - Messaging
      summary: Schedule a message
      operationId: scheduleMessage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SendMessageRequest'
                - type: object
                  required:
                    - conversation_id
                    - scheduled_at
                  properties:
                    conversation_id:
                      type: string
                    scheduled_at:
                      type: string
                      format: date-time
                    timezone:
                      type: string
                      example: "America/New_York"
      responses:
        '201':
          description: Message scheduled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduledMessage'

  /messages/scheduled/{scheduled_id}:
    delete:
      tags:
        - Messaging
      summary: Cancel scheduled message
      operationId: cancelScheduledMessage
      parameters:
        - name: scheduled_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Scheduled message cancelled

  # ============================================================================
  # POLLS
  # ============================================================================
  /conversations/{conversation_id}/polls:
    post:
      tags:
        - Messaging
      summary: Create a poll
      operationId: createPoll
      parameters:
        - $ref: '#/components/parameters/ConversationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - question
                - options
              properties:
                question:
                  type: string
                  maxLength: 300
                options:
                  type: array
                  items:
                    type: string
                    maxLength: 100
                  minItems: 2
                  maxItems: 10
                allows_multiple_answers:
                  type: boolean
                  default: false
                is_anonymous:
                  type: boolean
                  default: false
                closes_at:
                  type: string
                  format: date-time
                quiz_mode:
                  type: boolean
                  default: false
                correct_option_index:
                  type: integer
                  minimum: 0
      responses:
        '201':
          description: Poll created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Poll'

  /conversations/{conversation_id}/polls/{poll_id}/vote:
    post:
      tags:
        - Messaging
      summary: Vote on a poll
      operationId: votePoll
      parameters:
        - $ref: '#/components/parameters/ConversationId'
        - name: poll_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - option_indices
              properties:
                option_indices:
                  type: array
                  items:
                    type: integer
                    minimum: 0
      responses:
        '200':
          description: Vote recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Poll'

  # ============================================================================
  # GROUPS
  # ============================================================================
  /groups:
    get:
      tags:
        - Groups
      summary: List user's groups
      operationId: listGroups
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [owned, admin, member, all]
            default: all
        - name: visibility
          in: query
          schema:
            type: string
            enum: [public, private, all]
            default: all
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
      responses:
        '200':
          description: Group list
          content:
            application/json:
              schema:
                type: object
                properties:
                  groups:
                    type: array
                    items:
                      $ref: '#/components/schemas/GroupSummary'
                  next_page_token:
                    type: string
    post:
      tags:
        - Groups
      summary: Create a new group
      operationId: createGroup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGroupRequest'
      responses:
        '201':
          description: Group created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'

  /groups/discover:
    get:
      tags:
        - Groups
      summary: Discover public groups
      operationId: discoverGroups
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: min_trust_score
          in: query
          schema:
            type: integer
            minimum: 0
            maximum: 100
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [relevance, members, activity, trust_score]
            default: relevance
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
      responses:
        '200':
          description: Discovered groups
          content:
            application/json:
              schema:
                type: object
                properties:
                  groups:
                    type: array
                    items:
                      $ref: '#/components/schemas/GroupSummary'
                  next_page_token:
                    type: string

  /groups/{group_id}:
    get:
      tags:
        - Groups
      summary: Get group details
      operationId: getGroup
      parameters:
        - $ref: '#/components/parameters/GroupId'
      responses:
        '200':
          description: Group details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
    patch:
      tags:
        - Groups
      summary: Update group settings
      operationId: updateGroup
      parameters:
        - $ref: '#/components/parameters/GroupId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateGroupRequest'
      responses:
        '200':
          description: Group updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
    delete:
      tags:
        - Groups
      summary: Delete group
      operationId: deleteGroup
      parameters:
        - $ref: '#/components/parameters/GroupId'
      responses:
        '204':
          description: Group deleted

  /groups/{group_id}/join:
    post:
      tags:
        - Groups
      summary: Join a public group or request to join
      operationId: joinGroup
      parameters:
        - $ref: '#/components/parameters/GroupId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                invite_code:
                  type: string
                message:
                  type: string
                  maxLength: 200
      responses:
        '200':
          description: Joined or request submitted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [joined, pending_approval, rejected]
                  group:
                    $ref: '#/components/schemas/Group'

  /groups/{group_id}/leave:
    post:
      tags:
        - Groups
      summary: Leave group
      operationId: leaveGroup
      parameters:
        - $ref: '#/components/parameters/GroupId'
      responses:
        '204':
          description: Left group

  /groups/{group_id}/invite:
    post:
      tags:
        - Groups
      summary: Generate invite link
      operationId: createGroupInvite
      parameters:
        - $ref: '#/components/parameters/GroupId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                max_uses:
                  type: integer
                  minimum: 1
                expires_at:
                  type: string
                  format: date-time
                requires_approval:
                  type: boolean
                  default: false
      responses:
        '201':
          description: Invite created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupInvite'

  /groups/{group_id}/pinned:
    get:
      tags:
        - Groups
      summary: Get pinned messages
      operationId: getPinnedMessages
      parameters:
        - $ref: '#/components/parameters/GroupId'
      responses:
        '200':
          description: Pinned messages
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items:
                      $ref: '#/components/schemas/Message'
    post:
      tags:
        - Groups
      summary: Pin a message
      operationId: pinMessage
      parameters:
        - $ref: '#/components/parameters/GroupId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - message_id
              properties:
                message_id:
                  type: string
                notify_members:
                  type: boolean
                  default: false
      responses:
        '200':
          description: Message pinned

  /groups/{group_id}/pinned/{message_id}:
    delete:
      tags:
        - Groups
      summary: Unpin a message
      operationId: unpinMessage
      parameters:
        - $ref: '#/components/parameters/GroupId'
        - $ref: '#/components/parameters/MessageId'
      responses:
        '204':
          description: Message unpinned

  # ============================================================================
  # CHANNELS
  # ============================================================================
  /channels:
    get:
      tags:
        - Groups
      summary: List user's channels
      operationId: listChannels
      parameters:
        - name: role
          in: query
          schema:
            type: string
            enum: [owner, admin, subscriber, all]
            default: all
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
      responses:
        '200':
          description: Channel list
          content:
            application/json:
              schema:
                type: object
                properties:
                  channels:
                    type: array
                    items:
                      $ref: '#/components/schemas/ChannelSummary'
                  next_page_token:
                    type: string
    post:
      tags:
        - Groups
      summary: Create broadcast channel
      operationId: createChannel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateChannelRequest'
      responses:
        '201':
          description: Channel created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Channel'

  /channels/{channel_id}:
    get:
      tags:
        - Groups
      summary: Get channel details
      operationId: getChannel
      parameters:
        - name: channel_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Channel details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Channel'
    patch:
      tags:
        - Groups
      summary: Update channel
      operationId: updateChannel
      parameters:
        - name: channel_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateChannelRequest'
      responses:
        '200':
          description: Channel updated
    delete:
      tags:
        - Groups
      summary: Delete channel
      operationId: deleteChannel
      parameters:
        - name: channel_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Channel deleted

  /channels/{channel_id}/subscribe:
    post:
      tags:
        - Groups
      summary: Subscribe to channel
      operationId: subscribeChannel
      parameters:
        - name: channel_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Subscribed

  /channels/{channel_id}/unsubscribe:
    post:
      tags:
        - Groups
      summary: Unsubscribe from channel
      operationId: unsubscribeChannel
      parameters:
        - name: channel_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Unsubscribed

  /channels/{channel_id}/posts:
    get:
      tags:
        - Groups
      summary: Get channel posts
      operationId: getChannelPosts
      parameters:
        - name: channel_id
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
      responses:
        '200':
          description: Channel posts
          content:
            application/json:
              schema:
                type: object
                properties:
                  posts:
                    type: array
                    items:
                      $ref: '#/components/schemas/ChannelPost'
                  next_page_token:
                    type: string
    post:
      tags:
        - Groups
      summary: Create channel post
      operationId: createChannelPost
      parameters:
        - name: channel_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - content
              properties:
                content:
                  type: string
                  maxLength: 10000
                attachments:
                  type: array
                  items:
                    $ref: '#/components/schemas/AttachmentInput'
                scheduled_at:
                  type: string
                  format: date-time
                silent:
                  type: boolean
                  default: false
      responses:
        '201':
          description: Post created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelPost'

  # ============================================================================
  # CALLS
  # ============================================================================
  /calls:
    post:
      tags:
        - Calls
      summary: Initiate a call
      operationId: initiateCall
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - conversation_id
                - type
              properties:
                conversation_id:
                  type: string
                type:
                  type: string
                  enum: [voice, video]
                scheduled_at:
                  type: string
                  format: date-time
      responses:
        '201':
          description: Call initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Call'

  /calls/{call_id}:
    get:
      tags:
        - Calls
      summary: Get call details
      operationId: getCall
      parameters:
        - name: call_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Call details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Call'

  /calls/{call_id}/join:
    post:
      tags:
        - Calls
