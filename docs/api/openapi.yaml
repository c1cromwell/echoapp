        read:
          type: boolean
        created_at:
          type: string
          format: date-time

    NotificationSettings:
      type: object
      properties:
        push_enabled:
          type: boolean
        messages:
          type: boolean
        mentions:
          type: boolean
        reactions:
          type: boolean
        contact_requests:
          type: boolean
        group_invites:
          type: boolean
        calls:
          type: boolean
        rewards:
          type: boolean
        quiet_hours:
          type: object
          properties:
            enabled:
              type: boolean
            start:
              type: string
              pattern: '^\d{2}:\d{2}$'
            end:
              type: string
              pattern: '^\d{2}:\d{2}$'
            timezone:
              type: string

    Device:
      type: object
      required:
        - id
        - platform
      properties:
        id:
          type: string
        platform:
          type: string
          enum: [ios, android]
        device_name:
          type: string
        last_active:
          type: string
          format: date-time
        registered_at:
          type: string
          format: date-time

    # --------------------------------------------------------------------------
    # Enterprise
    # --------------------------------------------------------------------------
    OrganizationRegistration:
      type: object
      required:
        - legal_name
        - type
        - country
      properties:
        legal_name:
          type: string
        display_name:
          type: string
        type:
          type: string
          enum: [corporation, financial_institution, government, nonprofit]
        country:
          type: string
        registration_number:
          type: string
        website:
          type: string
          format: uri
        contact_email:
          type: string
          format: email

    Organization:
      type: object
      required:
        - id
        - legal_name
        - verification_status
      properties:
        id:
          type: string
        did:
          type: string
        legal_name:
          type: string
        display_name:
          type: string
        type:
          type: string
        logo_url:
          type: string
          format: uri
        verification_status:
          type: string
          enum: [pending, verified, suspended]
        verification_tier:
          type: string
          enum: [basic, regulated, government]
        employee_count:
          type: integer
        created_at:
          type: string
          format: date-time

    Employee:
      type: object
      required:
        - did
        - role
      properties:
        did:
          type: string
        display_name:
          type: string
        role:
          type: string
          enum: [admin, manager, representative, support]
        department:
          type: string
        title:
          type: string
        verified:
          type: boolean
        added_at:
          type: string
          format: date-time

    # --------------------------------------------------------------------------
    # Bots
    # --------------------------------------------------------------------------
    Bot:
      type: object
      required:
        - id
        - display_name
        - owner_did
      properties:
        id:
          type: string
        display_name:
          type: string
        username:
          type: string
        description:
          type: string
        avatar_url:
          type: string
          format: uri
        owner_did:
          type: string
        trust_score:
          type: integer
        webhook_url:
          type: string
          format: uri
        commands:
          type: array
          items:
            $ref: '#/components/schemas/BotCommand'
        active:
          type: boolean
        created_at:
          type: string
          format: date-time

    BotListing:
      type: object
      required:
        - id
        - display_name
      properties:
        id:
          type: string
        display_name:
          type: string
        description:
          type: string
        avatar_url:
          type: string
          format: uri
        category:
          type: string
        trust_score:
          type: integer
        user_count:
          type: integer
        rating:
          type: number
          format: float
        review_count:
          type: integer

    CreateBotRequest:
      type: object
      required:
        - display_name
      properties:
        display_name:
          type: string
          maxLength: 64
        username:
          type: string
          maxLength: 32
        description:
          type: string
          maxLength: 500
        avatar:
          type: string
        webhook_url:
          type: string
          format: uri
        commands:
          type: array
          items:
            $ref: '#/components/schemas/BotCommand'

    BotCommand:
      type: object
      required:
        - command
        - description
      properties:
        command:
          type: string
          pattern: '^/[a-z0-9_]+$'
        description:
          type: string
        parameters:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              description:
                type: string
              required:
                type: boolean

    BotPermissions:
      type: object
      properties:
        can_read_messages:
          type: boolean
        can_send_messages:
          type: boolean
        can_read_members:
          type: boolean
        can_manage_messages:
          type: boolean
        can_initiate_payments:
          type: boolean
        allowed_conversations:
          type: array
          items:
            type: string
