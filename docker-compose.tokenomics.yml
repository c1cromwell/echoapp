version: '3.8'

services:
  # Go test runner for unit tests
  unit-tests:
    build:
      context: .
      dockerfile: test/tokenomics/Dockerfile.test
    container_name: echo-unit-tests
    environment:
      - ENVIRONMENT=test
      - LOG_LEVEL=info
      - GO_ENV=test
    working_dir: /app
    volumes:
      - .:/app
      - go-modules:/go/pkg/mod
    command: >
      sh -c "
        echo '===== Running Unit Tests =====' &&
        go test ./test/tokenomics -v -cover -coverprofile=coverage.out &&
        echo '===== Running Benchmarks =====' &&
        go test ./test/tokenomics -bench=. -benchmem -benchtime=5s
      "
    networks:
      - echo-network

  # Constellation TestNet simulator (local)
  constellation-local:
    image: golang:1.20-alpine
    container_name: constellation-local
    working_dir: /app
    environment:
      - DAG_MODE=local
      - DAG_PORT=9000
      - DAG_P2P_PORT=9001
      - LOG_LEVEL=info
    volumes:
      - .:/app
      - go-modules:/go/pkg/mod
      - constellation-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: >
      sh -c "
        apk add --no-cache curl &&
        echo 'Starting local Constellation node...' &&
        sleep 60
      "
    networks:
      - echo-network

  # Metagraph validator node
  echo-validator:
    build:
      context: .
      dockerfile: cmd/metagraph/Dockerfile
    container_name: echo-validator
    depends_on:
      constellation-local:
        condition: service_healthy
    environment:
      - DAG_ENDPOINT=http://constellation-local:9000
      - METAGRAPH_ID=echo-token-local
      - VALIDATOR_BIND_PORT=9002
      - VALIDATOR_P2P_PORT=9003
      - LOG_LEVEL=debug
    ports:
      - "9002:9002"
      - "9003:9003"
    volumes:
      - .:/app
      - go-modules:/go/pkg/mod
      - validator-data:/data
    networks:
      - echo-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9002/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Integration test runner
  integration-tests:
    build:
      context: .
      dockerfile: test/tokenomics/Dockerfile.integration
    container_name: echo-integration-tests
    depends_on:
      constellation-local:
        condition: service_healthy
      echo-validator:
        condition: service_healthy
    environment:
      - DAG_ENDPOINT=http://constellation-local:9000
      - METAGRAPH_ENDPOINT=http://echo-validator:9002
      - ENVIRONMENT=integration
      - LOG_LEVEL=debug
    volumes:
      - .:/app
      - go-modules:/go/pkg/mod
    command: >
      sh -c "
        echo '===== Running Integration Tests =====' &&
        go test ./test/integration -v -timeout=10m -run TestConstellationIntegration
      "
    networks:
      - echo-network

  # PostgreSQL for optional persistence
  postgres:
    image: postgres:15-alpine
    container_name: echo-postgres
    environment:
      - POSTGRES_USER=echo_user
      - POSTGRES_PASSWORD=echo_password
      - POSTGRES_DB=echo_tokenomics
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./test/tokenomics/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U echo_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - echo-network

  # Redis for caching (used in production)
  redis:
    image: redis:7-alpine
    container_name: echo-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - echo-network

  # Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: echo-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./test/tokenomics/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - echo-network

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: echo-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./test/tokenomics/grafana-dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus
    networks:
      - echo-network

volumes:
  go-modules:
  constellation-data:
  validator-data:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:

networks:
  echo-network:
    driver: bridge
