<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=375, initial-scale=1.0">
  <title>Echo - Welcome Screen</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #6366F1;
      --primary-dark: #4F46E5;
      --background: #FFFFFF;
      --text-primary: #1A1A1A;
      --text-secondary: #6B7280;
      --text-tertiary: #9CA3AF;
      --border: #E5E7EB;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #F3F4F6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .phone-frame {
      width: 375px;
      height: 812px;
      background: var(--background);
      border-radius: 40px;
      overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      position: relative;
    }

    .status-bar {
      height: 44px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 24px;
    }

    .status-bar .time {
      font-size: 15px;
      font-weight: 600;
    }

    .status-bar .icons {
      display: flex;
      gap: 4px;
      font-size: 12px;
    }

    .notch {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 150px;
      height: 30px;
      background: #000;
      border-radius: 0 0 20px 20px;
    }

    .content {
      display: flex;
      flex-direction: column;
      height: calc(100% - 44px);
      padding: 24px;
      justify-content: space-between;
    }

    .logo-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 60px;
    }

    .logo {
      width: 120px;
      height: 120px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      border-radius: 30px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 24px;
      box-shadow: 0 10px 40px -10px rgba(99, 102, 241, 0.5);
    }

    .logo-text {
      font-size: 32px;
      font-weight: bold;
      color: white;
      letter-spacing: -1px;
    }

    .tagline {
      font-size: 24px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.5px;
    }

    .button-section {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .btn {
      height: 56px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      border: none;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      transform: scale(0.98);
    }

    .btn-secondary {
      background: transparent;
      color: var(--primary);
      border: 2px solid var(--primary);
    }

    .btn-secondary:hover {
      background: rgba(99, 102, 241, 0.05);
    }

    .sign-in-link {
      text-align: center;
      padding: 12px;
      color: var(--text-secondary);
      font-size: 14px;
    }

    .sign-in-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .trust-badge {
      text-align: center;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }

    .lock-icon {
      font-size: 20px;
      margin-bottom: 8px;
    }

    .trust-text {
      font-size: 14px;
      color: var(--text-tertiary);
      line-height: 1.5;
    }

    .home-indicator {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 134px;
      height: 5px;
      background: var(--text-primary);
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div class="phone-frame">
    <div class="notch"></div>
    <div class="status-bar">
      <span class="time">9:41</span>
      <span class="icons">📶 📡 🔋</span>
    </div>
    
    <div class="content">
      <div class="logo-section">
        <div class="logo">
          <span class="logo-text">Echo</span>
        </div>
        <h1 class="tagline">Messaging with Trust</h1>
      </div>

      <div class="button-section">
        <button class="btn btn-primary">Continue with Phone</button>
        <button class="btn btn-secondary">Use Verifiable ID</button>
        <div class="sign-in-link">
          Already have an account? <a href="#">Sign In</a>
        </div>
      </div>

      <div class="trust-badge">
        <div class="lock-icon">🔒</div>
        <div class="trust-text">
          Your identity stays yours.<br>
          No data sold. Ever.
        </div>
      </div>
    </div>
    
    <div class="home-indicator"></div>
  </div>
</body>
</html>
