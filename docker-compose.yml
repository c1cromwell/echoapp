version: '3.8'

services:
  # Echo App API Server
  echoapp:
    build:
      context: .
      dockerfile: build/Dockerfile
    container_name: echoapp
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    ports:
      - "8000:8000"
    environment:
      - API_PORT=8000
      - ENVIRONMENT=development
      - LOG_LEVEL=debug
      # PostgreSQL
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_NAME=echoapp
      - DATABASE_USER=echoapp
      - DATABASE_PASSWORD=echoapp_dev
      - DATABASE_SSLMODE=disable
      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # NATS
      - NATS_URL=nats://nats:4222
      # Storage (MinIO S3-compatible)
      - STORAGE_BACKEND=s3
      - STORAGE_ENDPOINT=http://minio:9000
      - STORAGE_REGION=us-east-1
      - STORAGE_BUCKET=echo-media
      - STORAGE_ACCESS_KEY_ID=minioadmin
      - STORAGE_SECRET_ACCESS_KEY=minioadmin
      - STORAGE_FORCE_PATH_STYLE=true
    volumes:
      - ./migrations:/app/migrations:ro
    networks:
      - echo-network
    restart: unless-stopped

  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    container_name: echo-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: echoapp
      POSTGRES_USER: echoapp
      POSTGRES_PASSWORD: echoapp_dev
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U echoapp -d echoapp"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - echo-network

  # Redis for caching, blocklist, sessions, queue overflow
  redis:
    image: redis:7-alpine
    container_name: echo-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - echo-network

  # NATS for pub/sub event bus (group fan-out, broadcasts)
  nats:
    image: nats:2-alpine
    container_name: echo-nats
    ports:
      - "4222:4222"   # Client connections
      - "8222:8222"   # HTTP monitoring
    command: --http_port 8222 -js
    volumes:
      - nats-data:/data
    networks:
      - echo-network

  # MinIO S3-compatible object storage (media uploads)
  minio:
    image: minio/minio:latest
    container_name: echo-minio
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - echo-network

  # Auto-create the media bucket on startup
  minio-init:
    image: minio/mc:latest
    container_name: echo-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/echo-media &&
        echo 'Bucket echo-media ready'
      "
    networks:
      - echo-network

volumes:
  postgres-data:
  redis-data:
  nats-data:
  minio-data:

networks:
  echo-network:
    driver: bridge
